<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luminex CO. Ltd.</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="css/home.css">
    <style>
        #mobile-menu {
            transition: all 0.3s ease-in-out;
            max-height: 0;
            opacity: 0;
            overflow: hidden;
        }
        #mobile-menu.show-menu {
            display: block !important;
            max-height: 100vh;
            opacity: 1;
        }
    </style>
</head>

<body class="bg-gray-50">

<nav class="bg-white border-b border-gray-100 sticky top-0 z-50 transition-all duration-300">
    <div class="container mx-auto px-4 md:px-8 py-4 md:py-6">
        <div class="flex items-center justify-between lg:grid lg:grid-cols-3">
            
            <div class="lg:hidden flex items-center">
                <button id="menu-toggle" class="text-gray-600 focus:outline-none">
                    <i class="fa-solid fa-bars text-xl"></i>
                </button>
            </div>

            <div class="hidden lg:flex gap-8 items-center">
                <a href="index.html" class="nav-link-min">Home</a>
                <a href="collection.html" class="nav-link-min">Collection</a>
                <a href="orderStatus.html" class="nav-link-min">Order Status</a>
            </div>

            <div class="flex justify-center items-center">
                <a href="index.html" class="text-xl md:text-2xl font-black tracking-tighter uppercase leading-none text-black hover:text-gray-700 transition-colors">
                    Luminex
                </a>
            </div>

            <div class="flex items-center justify-end gap-4 md:gap-6 text-gray-500">
                <button onclick="toggleSearch()" class="hover:text-black transition-colors">
                    <i class="fa-solid fa-magnifying-glass text-sm"></i>
                </button>
                
                <a href="cart.html" id="wishlist-icon" class="hover:text-black transition-colors relative">
                    <i class="fa-regular fa-heart text-sm"></i>
                    <span id="wishlist-count" class="absolute -top-2 -right-2 bg-orange-500 text-white text-[9px] font-bold px-1.5 py-0.5 rounded-full hidden">0</span>
                </a>

                <div class="profile-dropdown hidden lg:block">
                    <button class="hover:text-black transition-colors focus:outline-none py-1">
                        <i class="fa-regular fa-user text-sm"></i>
                    </button>
                    <div class="dropdown-content shadow-xl border border-gray-100">
                        <div id="admin-section" style="display: none;">
                            <a href="admin/admin.html" id="admin-link">
                                <i class="fa-solid fa-gauge-high mr-2"></i> Admin Dashboard
                            </a>
                            <a href="admin/orders-admin.html" id="admin-orders-link">
                                <i class="fa-solid fa-clipboard-list mr-2"></i> Check Orders
                            </a>
                        </div>
                        
                        <a href="profile.html"><i class="fa-regular fa-circle-user mr-2"></i> My Profile</a>
                        <a href="orderStatus.html"><i class="fa-solid fa-truck-fast mr-2"></i> Order Status</a>
                        <a href="orderHistory.html"><i class="fa-solid fa-receipt mr-2"></i> Order History</a>
                        <a href="collection.html" class="font-bold text-orange-500"><i class="fa-solid fa-layer-group mr-2"></i> Collection</a>
                        <hr class="my-1 border-gray-50">
                        <a href="javascript:void(0)" onclick="handleAuthAction()" class="text-orange-600 font-bold auth-toggle-link">
                            <i class="fa-solid fa-arrow-right-from-bracket mr-2"></i> Sign Out
                        </a>
                    </div>
                </div>
            </div>
        </div>

        <div id="mobile-menu" class="hidden lg:hidden bg-white">
            <div class="flex flex-col py-4 space-y-4 border-t border-gray-50 mt-4">
                
                <div id="mobile-admin-section" style="display: none;">
                    <a href="admin/admin.html" id="mobile-admin-link" class="nav-link-min px-2">
                        <i class="fa-solid fa-gauge-high mr-2"></i> Admin Dashboard
                    </a>
                    <a href="admin/orders-admin.html" id="mobile-admin-orders-link" class="nav-link-min px-2">
                        <i class="fa-solid fa-clipboard-list mr-2"></i> Check Orders
                    </a>
                    <hr class="border-gray-50 my-2">
                </div>
                
                <a href="index.html" class="nav-link-min px-2">Home</a>
                <a href="collection.html" class="nav-link-min px-2">Collection</a>
                <a href="orderStatus.html" class="nav-link-min px-2">Order Status</a>
                <hr class="border-gray-50">
                <a href="profile.html" class="nav-link-min px-2"><i class="fa-regular fa-circle-user mr-2"></i> My Profile</a>
                <a href="javascript:void(0)" onclick="handleAuthAction()" class="nav-link-min px-2 text-red-500 font-bold auth-toggle-link">
                    <i class="fa-solid fa-arrow-right-from-bracket mr-2"></i> Sign Out
                </a>
            </div>
        </div>
    </div>

    <div id="search-bar" class="hidden bg-white border-t border-gray-100 px-8 py-10 animate-fade-in">
        <div class="max-w-3xl mx-auto flex items-center border-b border-black">
            <input id="searchBox" oninput="doSearch()" type="text" placeholder="WHAT ARE YOU LOOKING FOR?" 
                   class="w-full py-2 text-sm tracking-widest bg-transparent focus:outline-none placeholder-gray-300">
            <button onclick="toggleSearch()" class="text-xs font-bold">CLOSE</button>
        </div>
    </div>
</nav>

<br/>
<div class="container mx-auto px-4 md:px-8">
    <div id="filterContainer" class="flex flex-wrap gap-3 mb-8"></div>
    <div id="grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="js/auth-logic.js"></script>
<script src="js/home.js"></script>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const menuBtn = document.getElementById('menu-toggle');
        const mobileMenu = document.getElementById('mobile-menu');

        if (menuBtn && mobileMenu) {
            menuBtn.addEventListener('click', (e) => {
                e.stopPropagation(); 
                mobileMenu.classList.toggle('show-menu');
                const icon = menuBtn.querySelector('i');
                if (icon) {
                    icon.classList.toggle('fa-bars');
                    icon.classList.toggle('fa-xmark');
                }
            });
            mobileMenu.addEventListener('click', (e) => e.stopPropagation());
        }
    });

    document.addEventListener('click', () => {
        const mobileMenu = document.getElementById('mobile-menu');
        const menuBtn = document.getElementById('menu-toggle');
        if (mobileMenu?.classList.contains('show-menu')) {
            mobileMenu.classList.remove('show-menu');
            const icon = menuBtn?.querySelector('i');
            if (icon) {
                icon.classList.add('fa-bars');
                icon.classList.remove('fa-xmark');
            }
        }
    });
</script>
</body>
</html>
