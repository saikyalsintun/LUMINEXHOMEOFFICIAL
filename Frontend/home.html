<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luminex CO. Ltd.</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="home.css">
    <style>
        /* --- NAVIGATION TEXT STYLE FIXES --- */
        .nav-link-min {
            font-size: 0.75rem;
            font-weight: 500;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            transition: color 0.3s;
            color: #4b5563;
            text-decoration: none !important;
        }
        .nav-link-min:hover { color: #000; }

        /* --- DROPDOWN MENU STYLES --- */
        .profile-dropdown {
            position: relative;
            display: inline-block;
            padding-bottom: 15px; 
            margin-bottom: -15px;
        }

        .dropdown-content {
            opacity: 0;
            visibility: hidden;
            position: absolute;
            right: 0;
            top: 100%; 
            background-color: white;
            min-width: 200px;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.15);
            z-index: 1000;
            border-radius: 8px;
            padding: 10px 0;
            border: 1px solid #f3f4f6;
            transition: opacity 0.3s ease, visibility 0.3s ease;
            transition-delay: 0.1s;
        }

        .profile-dropdown:hover .dropdown-content {
            opacity: 1;
            visibility: visible;
            transition-delay: 0s;
        }

        .dropdown-content a {
            color: #4b5563;
            padding: 12px 20px;
            text-decoration: none !important;
            display: block;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            transition: all 0.2s;
        }

        .dropdown-content a:hover {
            background-color: #fff7ed;
            color: #fb923c;
            padding-left: 25px;
        }

        /* Ensure the Nav is always on the very top layer */
/* --- UPDATED MOBILE MENU LOGIC --- */
#mobile-menu {
    display: none; /* Start hidden */
    overflow: hidden;
    background-color: white;
    width: 100%;
}

/* When auth-logic.js adds the 'active' class */
#mobile-menu.active {
    display: block !important;
}

/* Optional: Add a smooth fade-in */
#mobile-menu.active {
    animation: fadeIn 0.3s ease-out;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(-10px); }
    to { opacity: 1; transform: translateY(0); }
}

        body {
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
    </style>
</head>

                <div class="profile-dropdown hidden lg:block">

                        </a>
                    </div>
                </div>
            </div>
        </div>

        <div id="mobile-menu" class="lg:hidden bg-white">

                    <a href="admin/admin.html" class="nav-link-min px-2 text-orange-500 font-bold"><i class="fa-solid fa-gauge-high mr-2"></i> Admin Dashboard</a>
                    <a href="admin/orders-admin.html" class="nav-link-min px-2 text-blue-600 font-bold"><i class="fa-solid fa-clipboard-list mr-2"></i> Check Orders</a>

                </div>

                <a href="index.html" class="nav-link-min px-2">Home</a>
                <a href="collection.html" class="nav-link-min px-2">Collection</a>
                <a href="orderStatus.html" class="nav-link-min px-2">Order Status</a>
                <hr class="border-gray-50">

                <a href="javascript:void(0)" onclick="handleAuthAction()" class="auth-toggle-link nav-link-min px-2 text-red-500 font-bold">

</nav>
