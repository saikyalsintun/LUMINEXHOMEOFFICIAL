<style>
/* --- NAVIGATION TEXT STYLE FIXES --- */
.nav-link-min {
    font-size: 0.75rem;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    transition: color 0.3s;
    color: #4b5563;
    text-decoration: none !important;
}
.nav-link-min:hover { 
    color: #000; 
}

/* --- DROPDOWN MENU STYLES --- */
.profile-dropdown {
    position: relative;
    display: inline-block;
    padding-bottom: 15px; 
    margin-bottom: -15px;
}

.dropdown-content {
    /* Change display:none to this combo for transitions to work */
    opacity: 0;
    visibility: hidden;
    
    position: absolute;
    right: 0;
    top: 100%; 
    background-color: white;
    min-width: 200px;
    box-shadow: 0px 10px 30px rgba(0,0,0,0.15);
    z-index: 1000;
    border-radius: 8px;
    padding: 10px 0;
    border: 1px solid #f3f4f6;

    /* This adds the magic delay and smoothness */
    transition: opacity 0.3s ease, visibility 0.3s ease;
    transition-delay: 0.1s; /* Keeps it open for 0.1s after mouse leaves */
}

.profile-dropdown:hover .dropdown-content {
    opacity: 1;
    visibility: visible;
    transition-delay: 0s; /* Appears instantly on hover */
}

.dropdown-content a {
    color: #4b5563;
    padding: 12px 20px;
    text-decoration: none !important;
    display: block;
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    transition: all 0.2s;
}

.dropdown-content a:hover {
    background-color: #fff7ed;
    color: #fb923c;
    padding-left: 25px;
}

/* --- MOBILE MENU ANIMATION --- */
#mobile-menu {
    transition: all 0.3s ease-in-out;
    max-height: 0;
    overflow: hidden;
}
#mobile-menu.active {
    max-height: 500px;
}

/* --- EXISTING STYLES --- */
body {
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
}

.fly-item {
    position: fixed;
    z-index: 99999;
    pointer-events: none;
    object-fit: contain;
    transition: all 0.8s cubic-bezier(0.42, 0, 0.58, 1);
    background: white;
    border-radius: 8px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.15);
}

@keyframes heartBeat {
    0% { transform: scale(1); }
    50% { transform: scale(1.6); color: #f97316; }
    100% { transform: scale(1); }
}

.animate-beat {
    display: inline-block;
    animation: heartBeat 0.4s ease-in-out;
}
</style>

<script>

    
    // --- 1. ADMIN & AUTH LOGIC ---
    document.addEventListener('DOMContentLoaded', () => {
        const isAdmin = localStorage.getItem('isAdmin');
        
        // Desktop elements
        const adminLink = document.getElementById('admin-link');
        const ordersLink = document.getElementById('admin-orders-link');

        // Mobile elements
        const mobileAdminLink = document.getElementById('mobile-admin-link');
        const mobileOrdersLink = document.getElementById('mobile-admin-orders-link');
        const mobileSeparator = document.getElementById('mobile-admin-separator');

        // If the logged in user is an admin, show all admin links
        if (isAdmin === 'true') {
            // Desktop Links
            if (adminLink) {
                adminLink.style.display = 'block';
                adminLink.style.color = '#fb923c'; 
                adminLink.style.fontWeight = 'bold';
            }
            if (ordersLink) {
                ordersLink.style.display = 'block';
                ordersLink.style.color = '#3b82f6';
                ordersLink.style.fontWeight = 'bold';
            }

            // Mobile Links
            if (mobileAdminLink) {
                mobileAdminLink.style.display = 'block';
            }
            if (mobileOrdersLink) {
                mobileOrdersLink.style.display = 'block';
            }
            if (mobileSeparator) {
                mobileSeparator.style.display = 'block';
            }
        }
        




        // Global Sign Out logic
        window.handleAuthAction = function() {
            localStorage.removeItem('isLoggedIn');
            localStorage.removeItem('isAdmin');
            localStorage.removeItem('userEmail');
            localStorage.removeItem('token');

            if (typeof firebase !== 'undefined' && firebase.auth) {
                firebase.auth().signOut().then(() => { 
                    window.location.href = 'login.html'; 
                }).catch(() => {
                    window.location.href = 'login.html';
                });
            } else {
                window.location.href = 'login.html';
            }
        };
    });

    // --- 2. MOBILE MENU TOGGLE ---
    const menuToggle = document.getElementById('menu-toggle');
    const mobileMenu = document.getElementById('mobile-menu');

    if (menuToggle && mobileMenu) {
        menuToggle.addEventListener('click', () => {
            mobileMenu.classList.toggle('active');
        });
    }

    // --- 3. SEARCH BAR TOGGLE ---
    function toggleSearch() {
        const searchBar = document.getElementById('search-bar');
        if (searchBar) {
            searchBar.classList.toggle('hidden');
            if (!searchBar.classList.contains('hidden')) {
                const searchBox = document.getElementById('searchBox');
                if (searchBox) searchBox.focus();
                
                // Close mobile menu if open when search starts
                if (mobileMenu) mobileMenu.classList.remove('active');
            }
        }
    }
</script>
