        /* Forced Admin Colors */
        .admin-link-orange { 
            color: #fb923c !important;

            color: #2563eb !important;

        #mobile-menu {

        .profile-dropdown { 
    position: relative; 
    display: inline-block; 
}

.dropdown-content {
    /* Changed from display: none to allow for transitions */
    opacity: 0;
    visibility: hidden;
    
    position: absolute; 
    right: 0; 
    top: 100%;
    background-color: white; 
    min-width: 220px; 
    z-index: 1000;
    border-radius: 8px; 
    padding: 10px 0;
    box-shadow: 0px 10px 30px rgba(0, 0, 0, 0.1); /* Optional: adds depth */

    /* The Secret Sauce: */
    transition: opacity 0.3s ease, visibility 0.3s ease;
    transition-delay: 0.5s; /* This keeps it open for 0.5s after mouse-out */
}

.profile-dropdown:hover .dropdown-content { 
    opacity: 1;
    visibility: visible;
    /* Reset delay on hover so it appears instantly when you touch it */
    transition-delay: 0s; 
}

.dropdown-content a {
    color: #4b5563; 
    padding: 12px 20px; 
    text-decoration: none !important;
    display: block; 
    font-size: 0.75rem; 
    text-transform: uppercase;
    transition: background 0.2s;
}

.dropdown-content a:hover { 
    background-color: #fff7ed; 
    color: #fb923c;
}
        /* Skeleton Shimmer Effect */
        .skeleton {
            background: #e5e7eb;
            border-radius: 4px;
            position: relative;
            overflow: hidden;
        }

        .skeleton::after {
            content: "";
            position: absolute;
            top: 0; right: 0; bottom: 0; left: 0;
            transform: translateX(-100%);
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            animation: shimmer 1.5s infinite;
        }

        @keyframes shimmer {
            100% { transform: translateX(100%); }
        }

        /* Ensure Tailwind's reset doesn't break Bootstrap's container width */
        .container {
            max-width: 1140px;
        }
    </style>
</head>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const menuBtn = document.getElementById('menu-toggle');
        const mobileMenu = document.getElementById('mobile-menu');

        if (menuBtn && mobileMenu) {
            menuBtn.addEventListener('click', (e) => {
                e.stopPropagation(); 
                mobileMenu.classList.toggle('show-menu');
                mobileMenu.classList.toggle('hidden');
                const icon = menuBtn.querySelector('i');
                if (icon) {
                    icon.classList.toggle('fa-bars');
                    icon.classList.toggle('fa-xmark');
                }
            });
        }
    });
</script>
