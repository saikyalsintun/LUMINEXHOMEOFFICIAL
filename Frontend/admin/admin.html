<!DOCTYPE html>
<html lang="en">
<head> 
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luminex | Product Administration</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .gradient-bg {
            background: linear-gradient(135deg, #1a1a1a 0%, #374151 100%);
        }
        /* Custom scrollbar for better mobile feel */
        ::-webkit-scrollbar {
            width: 5px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        ::-webkit-scrollbar-thumb {
            background: #888;
            border-radius: 10px;
        }
    </style>
</head> 
<body class="bg-gray-100 min-h-screen font-sans">

    <div id="authStatus" class="bg-yellow-100 text-yellow-800 text-[10px] py-2 text-center font-bold uppercase tracking-widest border-b border-yellow-200">
        Checking Authentication...
    </div>

    <header class="bg-black text-white py-6 px-4 md:px-10 shadow-lg flex flex-col md:flex-row justify-between items-center gap-6">
        <div class="text-center md:text-left">
            <h1 class="text-2xl font-black tracking-tight italic">LUMINEX <span class="text-blue-500">ADMIN</span></h1>
            <p class="text-gray-500 text-[10px] uppercase font-bold tracking-widest">Inventory Control Center</p>
        </div>
        <div class="flex gap-2 w-full md:w-auto">
            <a href="orders-admin.html" class="flex-1 md:flex-none text-center bg-gray-800 hover:bg-blue-600 px-4 py-2 rounded-lg text-[10px] font-bold uppercase transition">
                <i class="fa-solid fa-list-check mr-2"></i> Orders
            </a>
            <a href="../home.html" class="flex-1 md:flex-none text-center bg-gray-800 hover:bg-gray-700 px-4 py-2 rounded-lg text-[10px] font-bold uppercase transition">
                <i class="fa-solid fa-eye mr-2"></i> Storefront
            </a>
        </div>
    </header>

    <main class="max-w-6xl mx-auto py-6 md:py-10 px-4 md:px-6 grid grid-cols-1 lg:grid-cols-2 gap-8 md:gap-10">
        
        <section class="bg-white p-6 md:p-8 rounded-3xl shadow-xl border border-gray-200">
            <div class="flex items-center mb-6">
                <div class="bg-blue-100 p-3 rounded-xl mr-4">
                    <i class="fa-solid fa-plus text-blue-600 text-xl"></i>
                </div>
                <h2 class="text-xl md:text-2xl font-bold text-gray-800">Add New Product</h2>
            </div>
 
            <form id="productForm" class="space-y-5">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-semibold text-gray-600 mb-1">Product Name</label>
                        <input type="text" id="product_description" placeholder="Luxury Velvet Sofa" 
                            class="w-full p-3 bg-gray-50 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition" required>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-600 mb-1">Item Number</label>
                        <input type="text" id="itemNo" placeholder="8239A" 
                            class="w-full p-3 bg-gray-50 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition" required>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-600 mb-2">Category</label>
                    <div class="grid grid-cols-2 sm:grid-cols-3 gap-3 p-4 bg-gray-50 border border-gray-300 rounded-xl">
                        <label class="flex items-center space-x-2 cursor-pointer">
                            <input type="radio" name="category_radio" value="sofa" class="w-4 h-4 text-blue-600" checked>
                            <span class="text-[9px] text-gray-700 font-black uppercase">SOFA</span>
                        </label>
                        <label class="flex items-center space-x-2 cursor-pointer">
                            <input type="radio" name="category_radio" value="tv cabinet" class="w-4 h-4 text-blue-600">
                            <span class="text-[9px] text-gray-700 font-black uppercase">TV CABINET</span>
                        </label>
                        <label class="flex items-center space-x-2 cursor-pointer">
                            <input type="radio" name="category_radio" value="dining table" class="w-4 h-4 text-blue-600">
                            <span class="text-[9px] text-gray-700 font-black uppercase">DINING TABLE</span>
                        </label>
                        <label class="flex items-center space-x-2 cursor-pointer">
                            <input type="radio" name="category_radio" value="coffee table" class="w-4 h-4 text-blue-600">
                            <span class="text-[9px] text-gray-700 font-black uppercase">COFFEE TABLE</span>
                        </label>
                        <label class="flex items-center space-x-2 cursor-pointer">
                            <input type="radio" name="category_radio" value="drawer cabinet" class="w-4 h-4 text-blue-600">
                            <span class="text-[9px] text-gray-700 font-black uppercase">DRAWER</span>
                        </label>
                        <label class="flex items-center space-x-2 cursor-pointer">
                            <input type="radio" name="category_radio" value="chair" class="w-4 h-4 text-blue-600">
                            <span class="text-[9px] text-gray-700 font-black uppercase">CHAIR</span>
                        </label>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-600 mb-1">Material Details</label>
                    <textarea id="material" rows="2" placeholder="Solid Wood + Fabric" 
                        class="w-full p-3 bg-gray-50 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition" required></textarea>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-semibold text-gray-600 mb-1">Size (mm)</label>
                        <input type="text" id="productSize" placeholder="200x100" 
                            class="w-full p-3 bg-gray-50 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500" required>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-600 mb-1">Colors</label>
                        <input type="text" id="productColor" placeholder="Gold, Navy" 
                            class="w-full p-3 bg-gray-50 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500" required>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-600 mb-1">Product Image</label>
                    <div class="flex flex-col sm:flex-row gap-2">
                        <input type="text" id="image" placeholder="URL will appear here" 
                            class="flex-1 p-3 bg-gray-50 border border-gray-300 rounded-xl outline-none text-sm">
                        <button type="button" id="upload_widget" class="bg-blue-600 text-white px-6 py-3 rounded-xl text-[10px] font-bold uppercase hover:bg-blue-700 transition whitespace-nowrap">
                            <i class="fa-solid fa-camera mr-2"></i> Upload
                        </button>
                    </div>
                    <p class="text-[9px] text-gray-400 mt-2 uppercase font-bold tracking-wider italic text-center sm:text-left">Max file size: 5MB</p>
                </div>

                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-semibold text-gray-600 mb-1">Status Badge</label>
                        <input type="text" id="productStatus" placeholder="New Arrival" 
                            class="w-full p-3 bg-gray-50 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-600 mb-1">Availability</label>
                        <select id="remark" class="w-full p-3 bg-gray-50 border border-gray-300 rounded-xl outline-none">
                            <option value="New product">New Product</option>
                            <option value="In stock">In Stock</option>
                            <option value="Pre-Order">Pre-Order</option>
                        </select>
                    </div>
                </div>

                <button type="submit" id="submitBtn" 
                    class="w-full bg-black text-white py-4 rounded-2xl font-black text-xs uppercase tracking-widest hover:bg-blue-600 disabled:bg-gray-400 disabled:cursor-not-allowed transition shadow-lg mt-4">
                    <i class="fa-solid fa-cloud-arrow-up mr-2"></i> Add to MongoDB
                </button>
            </form>
        </section>

        <section class="flex flex-col items-center space-y-6 pt-4 lg:pt-10">
            <h3 class="text-[10px] font-black text-gray-400 uppercase tracking-widest">Storefront Live Preview</h3>
            
            <div id="previewCard" class="bg-white p-6 rounded-3xl shadow-sm border border-gray-200 flex flex-col w-full max-w-[320px]">
                <div class="w-full h-56 overflow-hidden rounded-2xl mb-4 bg-gray-100">
                    <img id="prevImage" src="https://placehold.co/400x400?text=Luminex+Preview" class="w-full h-full object-cover transition duration-500 hover:scale-105">
                </div>
                <p id="prevCategory" class="text-[9px] font-black text-blue-600 uppercase mb-1">SOFA</p>
                <h2 id="prevProdDesc" class="font-bold text-lg mb-1 text-gray-900 uppercase truncate">PRODUCT NAME</h2>
                <p id="prevMaterial" class="text-[10px] text-gray-500 mb-3 italic">Material details will show here...</p>
                <div class="flex justify-between items-center mt-auto pt-4 border-t border-gray-50">
                    <span id="prevColor" class="text-[10px] font-black uppercase px-2 py-1 bg-gray-100 rounded">COLOR</span>
                    <button class="bg-black text-white px-4 py-2 rounded-lg text-[10px] font-bold uppercase opacity-50 cursor-not-allowed">View Info</button>
                </div>
            </div>
        </section>
    </main>

    <script src="https://upload-widget.cloudinary.com/global/all.js" type="text/javascript"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="admin.js"></script>
    
</body>
</html>
