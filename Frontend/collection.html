    /* FORCING ADMIN COLORS */

    /* Skeleton Loading Styles */
        .skeleton-box {
            background-color: #f3f4f6;
            position: relative;
            overflow: hidden;
            border-radius: 2px;
        }

        .skeleton-box::after {
            content: "";
            position: absolute;
            top: 0; right: 0; bottom: 0; left: 0;
            transform: translateX(-100%);
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.5), transparent);
            animation: shimmer 1.5s infinite;
        }

        @keyframes shimmer {
            100% { transform: translateX(100%); }
        }

        .skeleton-text { height: 12px; margin-bottom: 8px; }
        .skeleton-img { width: 100%; aspect-ratio: 3 / 2; margin-bottom: 12px; }

        /* --- FLOATING CONTACT BUTTON STYLES --- */
.floating-container {

    right: 30px;

    visibility: hidden;
    transform: translateY(20px);
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

/* Reveal menu on hover */

    opacity: 1;
    visibility: visible;
    transform: translateY(0);
}

.menu-item {

<script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"></script>

<script>
    const categories = [
        { name: "Chair", key: "chair" },
        { name: "Coffee Table", key: "coffee" },
        { name: "Dining Table", key: "dining" },
        { name: "Drawer Cabinet", key: "drawer" },
        { name: "TV Cabinet", key: "tv" }
    ];

    function renderSkeletons() {
        const container = document.getElementById("collection-container");
        let skeletonHtml = "";
        
        // Render 2 categories worth of skeletons
        for(let i=0; i<2; i++) {
            skeletonHtml += `
                <div class="mb-4">
                    <div class="skeleton-box skeleton-text" style="width: 120px;"></div>
                    <div class="skeleton-box skeleton-text" style="width: 80px; height: 10px;"></div>
                </div>
                <div class="row">
                    ${[1,2,3].map(() => `
                        <div class="col-6 col-md-4">
                            <div class="product-card">
                                <div class="skeleton-box skeleton-img"></div>
                                <div class="skeleton-box skeleton-text" style="width: 90%;"></div>
                                <div class="skeleton-box skeleton-text" style="width: 60%;"></div>
                            </div>
                        </div>
                    `).join('')}
                </div><hr>`;
        }
        container.innerHTML = skeletonHtml;
    }

    async function loadCollections() {
        const container = document.getElementById("collection-container");
        if (!container) return;

        renderSkeletons(); // Show skeletons immediately

        try {
            const response = await fetch(`${window.API_BASE}/products`);
            if (!response.ok) throw new Error("API Offline");
            const products = await response.json();
            
            container.innerHTML = ""; // Clear skeletons

            categories.forEach(cat => {
                const filtered = products.filter(p => 
                    p.category.toLowerCase().includes(cat.key.toLowerCase())
                );
                if (filtered.length === 0) return;
                const previewItems = filtered.slice(0, 3);

                let sectionHtml = `
                    <div id="${cat.key}-section" class="collection-section d-flex justify-content-between align-items-end mb-4">
                        <div>
                            <h6 class="font-weight-bold mb-0 text-uppercase" style="letter-spacing:1.5px;">${cat.name}</h6>
                            <p class="text-muted small mb-0">${filtered.length} Items Available</p>
                        </div>
                        <a href="home.html?keyword=${cat.key}" class="see-more-btn">Explore All</a>
                    </div>
                    <div class="row">`;

                previewItems.forEach(p => {
                    sectionHtml += `
                        <div class="col-6 col-md-4">
                            <div class="product-card">
                                <div class="img-wrapper">
                                    <img src="${p.image}" alt="Luminex">
                                </div>
                                <div class="product-title">${p.product_description || 'Luminex Design Piece'}</div>
                                <p class="small text-muted mb-0 font-weight-bold" style="font-size: 10px;">${p.productStatus || ''}</p>
                            </div>
                        </div>`;
                });
                sectionHtml += `</div><hr>`;
                container.innerHTML += sectionHtml;
            });
        } catch (error) {
            console.error(error);
            container.innerHTML = `<div class="py-5 text-center"><p class="text-danger small">Offline: Unable to load collections</p></div>`;
        }
    }
    
    document.addEventListener('DOMContentLoaded', loadCollections);
</script>
