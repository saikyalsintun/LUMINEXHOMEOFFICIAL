<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luminex Admin | Customer Orders</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head> 
<body class="bg-gray-50 min-h-screen">
    <nav class="bg-black text-white p-6 shadow-xl">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-black tracking-widest uppercase">Luminex Order Management</h1>
            <a href="admin.html" class="text-xs font-bold uppercase border border-white/30 px-4 py-2 hover:bg-white hover:text-black transition">Back to Inventory</a>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto py-10 px-6">
        <div id="ordersContainer" class="space-y-6">
            <div class="text-center py-20 text-gray-400">
                <i class="fa-solid fa-spinner fa-spin text-4xl mb-4"></i>
                <p>Fetching orders from database...</p>
            </div>
        </div>
        <select onchange="filterByStatus(this.value)" class="filter-dropdown">
    <option value="">All Orders</option>
    <option value="Pending">New Orders</option>
    <option value="Transporting">In Transit</option>
    <option value="Received">Completed</option>
</select>
    </main>

    <script src="orders-admin.js"></script>
</body>
</html>
