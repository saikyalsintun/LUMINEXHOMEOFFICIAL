<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Checkout | Luminex Furniture</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://pro.fontawesome.com/releases/v5.10.0/css/all.css"/>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-light bg-white py-3 fixed-top shadow-sm">
    <div class="container">
        <img src="img/logo1.png" style="width:120px" alt="Luminex">
        <a href="home.html" class="text-dark font-weight-bold small uppercase">Back to Store</a>
    </div>
</nav>

<section class="container pt-5 mt-5">
    <h2 class="font-weight-bold mt-4">Checkout</h2>
    <hr>
</section>

<section class="container my-5">
    <div class="row">

        <div class="col-lg-7 col-md-12 col-12 mb-4">
            <h5 class="mb-4">Billing & Shipping Details</h5>

            <form id="orderForm">
                <div class="form-group">
                    <label class="small font-weight-bold text-uppercase">Full Name</label>
                    <input type="text" id="custName" class="form-control" placeholder="First and Last Name" required>
                </div>

                <div class="form-group">
                    <label class="small font-weight-bold text-uppercase">Phone Number</label>
                    <input type="tel" id="custPhone" class="form-control" placeholder="09xxxxxxxxx" required>
                </div>

                <div class="form-group">
                    <label class="small font-weight-bold text-uppercase">Delivery Address</label>
                    <textarea id="custAddress" class="form-control" rows="3" placeholder="Full Address" required></textarea>
                </div>
            </form>
        </div>

        <div class="col-lg-5 col-md-12 col-12">
            <div class="border p-4 bg-white rounded shadow-sm">
                <h5 class="mb-3">Order Summary</h5>

                <div id="cartGrid" class="mb-3">
                    <p class="text-muted small">Loading items...</p>
                </div>

                <hr>

                <div class="d-flex justify-content-between font-weight-bold">
                    <p>Total Items</p>
                    <p id="totalCount">0</p>
                </div>

                <button id="submitOrderBtn" onclick="submitOrder()" class="btn btn-dark btn-block mt-3 py-3 font-weight-bold">
                    PLACE ORDER
                </button>
            </div>
        </div>

    </div>
</section>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<script src="cart.js"></script>

</body>
</html>
