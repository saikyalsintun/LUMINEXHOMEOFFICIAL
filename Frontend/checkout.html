<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Checkout | Luminex Furniture</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css">

    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://pro.fontawesome.com/releases/v5.10.0/css/all.css"/>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-light bg-white py-3 fixed-top">
    <div class="container">
        <img src="img/logo1.png" style="width:120px" alt="Luminex">
    </div>
</nav>

<!-- CHECKOUT TITLE -->
<section class="container pt-5 mt-5">
    <h2 class="font-weight-bold">Checkout</h2>
    <hr>
</section>

<!-- CHECKOUT CONTENT -->
<section class="container my-5">
    <div class="row">

        <!-- CUSTOMER INFO -->
        <div class="col-lg-7 col-md-12 col-12 mb-4">
            <h5>Billing & Shipping Details</h5>

            <form>
                <div class="form-row">
                    <div class="form-group col-md-6">
                        <label>First Name</label>
                        <input type="text" class="form-control" required>
                    </div>
                    <div class="form-group col-md-6">
                        <label>Last Name</label>
                        <input type="text" class="form-control" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Email</label>
                    <input type="email" class="form-control" required>
                </div>

                <div class="form-group">
                    <label>Phone</label>
                    <input type="tel" class="form-control" required>
                </div>

                <div class="form-group">
                    <label>Address</label>
                    <input type="text" class="form-control" required>
                </div>

                <div class="form-row">
                    <div class="form-group col-md-6">
                        <label>City</label>
                        <input type="text" class="form-control">
                    </div>
                    <div class="form-group col-md-6">
                        <label>Postal Code</label>
                        <input type="text" class="form-control">
                    </div>
                </div>
            </form>
        </div>

        <!-- ORDER SUMMARY -->
        <div class="col-lg-5 col-md-12 col-12">
            <div class="border p-4">
                <h5>Order Summary</h5>

                <div class="d-flex justify-content-between">
                    <p>Modern Fabric Sofa</p>
                    <p>฿12,900</p>
                </div>

                <div class="d-flex justify-content-between">
                    <p>Oak Coffee Table</p>
                    <p>฿4,500</p>
                </div>

                <div class="d-flex justify-content-between">
                    <p>Shipping</p>
                    <p>฿500</p>
                </div>

                <hr>

                <div class="d-flex justify-content-between font-weight-bold">
                    <p>Total</p>
                    <p>฿17,900</p>
                </div>

                <button class="btn btn-dark btn-block mt-3">
                    PLACE ORDER
                </button>
            </div>
        </div>

    </div>
</section>

</body>
</html>
