<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Account | Luminex Furniture</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        :root {
            --text-dark: #1a1a1a;
            --text-muted: #777777;
            --border-color: #eeeeee;
        }

        body {
            background-color: #fcfcfc;
            color: var(--text-dark);
        }

        .admin-link-orange { color: #fb923c !important; font-weight: 800 !important; }
        .admin-link-blue { color: #2563eb !important; font-weight: 800 !important; }

        .nav-link-min {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: #666;
            transition: color 0.3s ease;
        }
        .nav-link-min:hover { color: #000; }

        .profile-dropdown { position: relative; display: inline-block; }
        .dropdown-content {
            opacity: 0;
            visibility: hidden;
            position: absolute; 
            right: 0; 
            top: 100%;
            background-color: white; 
            min-width: 220px; 
            z-index: 1000;
            border-radius: 8px; 
            padding: 10px 0;
            box-shadow: 0px 10px 30px rgba(0, 0, 0, 0.1);
            transition: opacity 0.3s ease, visibility 0.3s ease;
            transition-delay: 0.5s; 
        }

        .profile-dropdown:hover .dropdown-content { 
            opacity: 1;
            visibility: visible;
            transition-delay: 0s; 
        }

        .dropdown-content a {
            color: #4b5563; 
            padding: 12px 20px; 
            display: block; 
            font-size: 0.75rem; 
            text-transform: uppercase;
            transition: background 0.2s;
        }

        .dropdown-content a:hover { background-color: #fff7ed; color: #fb923c; }

        .account-menu .list-group-item {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            padding: 15px 20px;
            transition: 0.3s;
            display: block;
            text-decoration: none;
        }
        .account-menu .list-group-item.active {
            color: var(--text-dark) !important;
            font-weight: 700;
            border-left: 3px solid #000;
        }

        .info-card {
            background: #fff;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            padding: 40px;
        }
        .info-label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-muted);
            margin-bottom: 5px;
            font-weight: 700;
        }
        .info-value { font-size: 15px; color: var(--text-dark); font-weight: 500; }

        .skeleton {
            background: #e5e7eb;
            border-radius: 4px;
            position: relative;
            overflow: hidden;
        }
        .skeleton::after {
            content: "";
            position: absolute;
            top: 0; right: 0; bottom: 0; left: 0;
            transform: translateX(-100%);
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            animation: shimmer 1.5s infinite;
        }
        @keyframes shimmer { 100% { transform: translateX(100%); } }
    </style>
</head>

<body>

<nav class="bg-white border-b border-gray-100 sticky top-0 z-50">
    <div class="container mx-auto px-4 py-4 md:py-6">
        <div class="flex items-center justify-between lg:grid lg:grid-cols-3">
            <div class="lg:hidden flex items-center">
                <button id="menu-toggle" class="text-gray-600 focus:outline-none">
                    <i class="fa-solid fa-bars text-xl"></i>
                </button>
            </div>

            <div class="hidden lg:flex gap-8 items-center">
                <a href="index.html" class="nav-link-min">Home</a>
                <a href="collection.html" class="nav-link-min">Collection</a>
                <a href="orderStatus.html" class="nav-link-min">Order Status</a>
            </div>

            <div class="flex justify-center items-center">
                <a href="index.html">
                    <img src="image/logo2.png" alt="Luminex" class="h-7 md:h-9">
                </a>
            </div>

            <div class="flex items-center justify-end gap-4 md:gap-6 text-gray-500">
                <button onclick="toggleSearch()" class="hover:text-black"><i class="fa-solid fa-magnifying-glass text-sm"></i></button>
                <a href="cart.html" class="relative hover:text-black"><i class="fa-regular fa-heart text-sm"></i></a>

                <div class="profile-dropdown hidden lg:block">
                    <button class="hover:text-black py-1"><i class="fa-regular fa-user text-sm"></i></button>
                    <div class="dropdown-content shadow-xl border border-gray-100">
                        <div id="admin-section" style="display: none;">
                            <a href="admin/admin.html" class="admin-link-orange"><i class="fa-solid fa-gauge-high mr-2"></i> Admin Dashboard</a>
                            <a href="admin/orders-admin.html" class="admin-link-blue"><i class="fa-solid fa-clipboard-list mr-2"></i> Check Orders</a>
                            <hr class="my-1 border-gray-50">
                        </div>
                        <a href="profile.html"><i class="fa-regular fa-circle-user mr-2"></i> My Profile</a>
                        <a href="orderHistory.html"><i class="fa-solid fa-receipt mr-2"></i> Order History</a>
                        <hr class="my-1 border-gray-50">
                        <a href="javascript:void(0)" onclick="handleAuthAction()" class="auth-toggle-link text-orange-600 font-bold">
                            <i class="fa-solid fa-right-to-bracket mr-2"></i> LOGIN
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</nav>

<div class="container mx-auto px-4 mt-12 mb-20">
    <div class="flex flex-wrap -mx-4">
        <div class="w-full lg:w-1/4 px-4 mb-8">
            <h4 class="font-bold text-lg mb-6 tracking-wider">My Account</h4>
            <div class="account-menu">
                <a href="profile.html" class="list-group-item active">Profile Information</a>
                <a href="orderHistory.html" class="list-group-item">Order History</a>
                <hr class="my-4 border-gray-100">
                <a href="javascript:void(0)" class="list-group-item text-red-500" onclick="handleAuthAction()">
                    <i class="fas fa-sign-out-alt mr-2"></i> Sign Out
                </a>
            </div>
        </div>

        <div class="w-full lg:w-3/4 px-4">
            <div class="info-card shadow-sm">
                <div class="flex justify-between items-center mb-6">
                    <h5 class="font-bold text-sm uppercase tracking-widest">Personal Details</h5>
                    <button class="text-[11px] font-bold uppercase border border-black px-4 py-2 hover:bg-black hover:text-white transition">Update Info</button>
                </div>
                <hr class="mb-8 border-gray-50">

                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <div class="info-group">
                        <div class="info-label">Full Name</div>
                        <div class="info-value skeleton h-6 w-3/4" id="display-name"></div>
                    </div>
                    <div class="info-group">
                        <div class="info-label">Email Address</div>
                        <div class="info-value skeleton h-6 w-1/2" id="display-email"></div>
                    </div>
                    <div class="info-group">
                        <div class="info-label">Phone Number</div>
                        <div id="display-phone" class="info-value">Loading...</div>
                    </div>
                    <div class="info-group">
                        <div class="info-label">Line ID</div>
                        <div id="display-line" class="info-value">Loading...</div>
                    </div>
                    <div class="info-group col-span-1 md:col-span-2">
                        <div class="info-label">Delivery Address</div>
                        <div id="display-address" class="info-value">Loading...</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>
<script src="js\auth-logic.js"></script>

<script>
    // 1. DYNAMIC API URL SETUP
    const API_URL = window.API_BASE || (
        (window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1")
            ? "http://localhost:5000/api" 
            : "https://luminexhomeofficial.vercel.app/api"
    );

    // 2. FETCH DATA FUNCTION
    async function loadUserProfile(user) {
        const nameEl = document.getElementById('display-name');
        const emailEl = document.getElementById('display-email');
        const phoneEl = document.getElementById('display-phone');
        const addressEl = document.getElementById('display-address');
        const lineEl = document.getElementById('display-line');

        try {
            // Fetch orders matching the Firebase UID
            const response = await fetch(`${API_URL}/orders?userId=${user.uid}`);
            
            if (response.ok) {
                const orders = await response.json();
                
                // Remove loading states
                nameEl.classList.remove('skeleton');
                emailEl.classList.remove('skeleton');

                if (orders && orders.length > 0) {
                    const customer = orders[0].customer; // Take data from last order
                    nameEl.innerText = customer.name || user.displayName || "Luminex Member";
                    emailEl.innerText = customer.email || user.email;
                    phoneEl.innerText = customer.phone || "Not Provided";
                    lineEl.innerText = customer.lineId || "Not Provided";
                    addressEl.innerText = customer.address || "Not Provided";
                } else {
                    // Logged in but no order history yet
                    nameEl.innerText = user.displayName || "Luminex Member";
                    emailEl.innerText = user.email;
                    phoneEl.innerText = "No data from orders";
                    addressEl.innerText = "No data from orders";
                    lineEl.innerText = "Not Provided";
                }
            }
        } catch (err) {
            console.error("API Error:", err);
            nameEl.innerText = "Error loading data";
        }
    }

    // 3. OBSERVE AUTH STATE
    firebase.auth().onAuthStateChanged((user) => {
        if (user) {
            console.log("Profile loading for UID:", user.uid);
            loadUserProfile(user);
        } else {
            // Redirect to login if not authenticated
            window.location.href = "login.html";
        }
    });

    // 4. UI LOGIC
    window.toggleSearch = () => document.getElementById('search-bar')?.classList.toggle('hidden');
    
</script>
</body>
</html>
