<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Wishlist | Luminex</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  
</head> 


<style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');

body {
    font-family: 'Inter', sans-serif;
    letter-spacing: -0.01em;
}

/* Custom Scrollbar for a clean look */
::-webkit-scrollbar {
    width: 6px;
}
::-webkit-scrollbar-track {
    background: #f1f1f1;
}
::-webkit-scrollbar-thumb {
    background: #000;
}

/* Minimalist container fade-in */
#cartGrid {
    animation: fadeIn 0.5s ease-out;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}
</style>
<body class="bg-white min-h-screen">

    <nav class="bg-white border-b border-gray-100 sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center p-6">
            <h1 onclick="window.location.href='index.html'" class="text-2xl font-black tracking-tighter uppercase cursor-pointer text-black">
                LUMINEX<span class="text-gray-300">.</span>
            </h1>
            <div class="flex items-center gap-8">
                <a href="home.html" class="text-[10px] font-black uppercase tracking-widest hover:underline text-black">Continue Shopping</a>
            </div>
        </div>
    </nav>

    <div class="container mx-auto p-10 max-w-4xl">
        <div class="mb-10 text-center">
            <h2 class="text-3xl font-black uppercase tracking-tighter">Your Wishlist</h2>
            <div class="w-10 h-1 border-b-2 border-black mx-auto mt-2"></div>
        </div>
        
        <div id="cartGrid" class="flex flex-col gap-4">
            <div class="text-center py-20 text-gray-400">
                <i class="fas fa-spinner fa-spin text-2xl"></i>
            </div>
        </div>

        <div class="mt-12 bg-gray-50 p-8 rounded-sm border border-gray-100">
            <div class="mb-8">
                <h3 class="text-xs font-black uppercase tracking-[0.3em] text-black">Shipping Details</h3>
                <p class="text-[10px] text-gray-400 uppercase mt-1 italic font-bold">Courier will use these details for delivery</p>
            </div>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-10">
                <div class="flex flex-col gap-2">
                    <label class="text-[9px] font-black uppercase tracking-widest text-gray-400">Recipient Name</label>
                    <input type="text" id="custName" placeholder="Full Name" 
                           class="bg-transparent border-b border-gray-300 py-2 text-sm outline-none focus:border-black transition-all uppercase placeholder:text-gray-300">
                </div>
                
                <div class="flex flex-col gap-2">
                    <label class="text-[9px] font-black uppercase tracking-widest text-gray-400">Contact Number</label>
                    <input type="text" id="custPhone" placeholder="+00 000 000 000" 
                           class="bg-transparent border-b border-gray-300 py-2 text-sm outline-none focus:border-black transition-all placeholder:text-gray-300">
                </div>

                <div class="flex flex-col gap-2 md:col-span-2">
                    <label class="text-[9px] font-black uppercase tracking-widest text-gray-400">Full Shipping Address</label>
                    <textarea id="custAddress" placeholder="Street, Building, City, Country" rows="2"
                              class="bg-transparent border-b border-gray-300 py-2 text-sm outline-none focus:border-black transition-all resize-none placeholder:text-gray-300 uppercase"></textarea>
                </div>
            </div>
        </div>

        <div class="mt-12 flex flex-col items-center border-t border-gray-100 pt-10">
            <div id="orderSummary" class="mb-8 text-center hidden">
                <p class="text-[10px] font-bold uppercase tracking-widest text-gray-400">Total Selection</p>
                <p id="totalCount" class="text-2xl font-black">0</p>
            </div>
            
            <button id="submitOrderBtn" onclick="submitOrder()" 
                class="bg-black text-white px-16 py-5 text-[10px] font-black uppercase tracking-[0.4em] hover:bg-gray-800 transition-all disabled:bg-gray-200 disabled:cursor-not-allowed shadow-xl">
                Place Order
            </button>
            <p class="mt-4 text-[9px] text-gray-400 uppercase tracking-widest">Payment will be processed upon delivery</p>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    
    <script src="cart.js"></script>

</body>
</html>
