<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="js/auth-logic.js"></script>

<script>
    const API_URL = `${window.API_BASE}/orders`;
    const urlParams = new URLSearchParams(window.location.search);
    let orderIdFromUrl = urlParams.get('id');

    // Attach to the auth observer from auth-logic.js
    firebase.auth().onAuthStateChanged(async (user) => {
        if (user) {
            fetchOrderStatus();
        } else {
            if (!orderIdFromUrl || orderIdFromUrl === "null") {
                window.location.href = "login.html";
            } else {
                fetchOrderStatus(); 
            }
        }
    });

    async function fetchOrderStatus() {
        let fetchEndpoint = "";
        let token = null;
        const user = firebase.auth().currentUser;

        try {
            if (user) {
                token = await user.getIdToken();
            }

            if (orderIdFromUrl && orderIdFromUrl !== "null") {
                fetchEndpoint = `${API_URL}/${orderIdFromUrl}`;
            } else if (user) {
                fetchEndpoint = `${API_URL}/latest/${user.uid}`;
            } else {
                return renderNoOrderFound();
            }
            
            const headers = token ? { 'Authorization': `Bearer ${token}` } : {};
            const response = await fetch(`${fetchEndpoint}?t=${Date.now()}`, { headers });
            
            if (!response.ok) {
                if (response.status === 404) return renderNoOrderFound();
                throw new Error(`HTTP Error: ${response.status}`);
            }

            const order = await response.json();
            
            if (order && order._id) {
                renderUI(order);
            } else {
                renderNoOrderFound();
            }

        } catch (error) {
            console.error("Order Fetch Error:", error);
            renderError(error.message);
        }
    }

    function renderUI(order) {
        const container = document.getElementById('statusContent');
        if (!container) return;

        const status = order.status || 'Pending';
        const steps = [
            { key: 'Pending', label: 'Confirmed', icon: 'fa-clipboard-check' },
            { key: 'Approved', label: 'Processing', icon: 'fa-gears' },
            { key: 'Order Made', label: 'Produced', icon: 'fa-shirt' },
            { key: 'Transporting', label: 'On Way', icon: 'fa-truck-fast' },
            { key: 'Received', label: 'Delivered', icon: 'fa-house-chimney-check' }
        ];

        const visualStatus = (status === 'Direct Contact') ? 'Approved' : status;
        const currentIndex = steps.findIndex(s => s.key === visualStatus);
        const isCancelled = status === 'Cancelled';

        container.innerHTML = `
            <div class="bg-white rounded-3xl shadow-2xl overflow-hidden border border-gray-100 animate-in fade-in">
                <div class="bg-black p-8 text-white text-center">
                    <p class="text-[10px] font-bold uppercase tracking-[0.3em] text-gray-500 mb-2">Live Status</p>
                    <h1 class="text-2xl font-black uppercase italic">${isCancelled ? 'Cancelled' : status}</h1>
                    <p class="text-[9px] text-gray-400 mt-4 font-mono border border-gray-800 inline-block px-3 py-1 rounded">Ref: ${order._id}</p>
                </div>

                <div class="p-8 md:p-12">
                    ${!isCancelled && currentIndex !== -1 ? `
                        <div class="relative flex justify-between items-start mb-16">
                            <div class="absolute top-5 left-0 w-full h-[2px] bg-gray-100"></div>
                            <div class="absolute top-5 left-0 h-[2px] bg-black transition-all duration-1000" style="width: ${(currentIndex / (steps.length - 1)) * 100}%"></div>
                            ${steps.map((step, index) => `
                                <div class="relative z-10 flex flex-col items-center">
                                    <div class="w-10 h-10 rounded-full flex items-center justify-center ${index <= currentIndex ? 'bg-black text-white' : 'bg-gray-100 text-gray-300'}">
                                        <i class="fa-solid ${step.icon} text-xs"></i>
                                    </div>
                                    <p class="mt-4 text-[8px] font-black uppercase ${index <= currentIndex ? 'text-black' : 'text-gray-300'}">${step.label}</p>
                                </div>
                            `).join('')}
                        </div>
                    ` : ''}

                    <div class="bg-gray-50 rounded-2xl p-6 mb-10 text-center border border-dashed">
                        <p class="text-xs text-gray-600 font-bold uppercase italic">${getStatusMessage(status)}</p>
                    </div>

                    <div class="space-y-4 mb-8">
                        <p class="text-[10px] font-black uppercase text-gray-400 border-b pb-2">Items</p>
                        ${order.items.map(item => `
                            <div class="flex items-center gap-4 py-3 border-b border-gray-50 last:border-0">
                                <img src="${item.image}" class="w-14 h-14 object-contain rounded-xl bg-gray-50" onerror="this.src='https://placehold.co/100'">
                                <div class="flex-grow">
                                    <h4 class="text-[11px] font-black uppercase">${item.product_description}</h4>
                                    <p class="text-[9px] text-gray-400 font-bold uppercase">${item.size || 'Std'} — ${item.color || 'Def'}</p>
                                </div>
                                <p class="text-[11px] font-black">x${item.quantity}</p>
                            </div>
                        `).join('')}
                    </div>

                    ${status === 'Transporting' ? `
                        <button id="confirmBtn" onclick="updateToReceived('${order._id}')" class="w-full bg-black text-white py-5 rounded-2xl font-black uppercase tracking-widest text-[10px] hover:bg-emerald-600 transition-colors">
                            Confirm Delivery
                        </button>
                    ` : ''}
                </div>
            </div>
        `;
    }

    // FIXED: Using window scope and correct Firebase user method
    window.updateToReceived = async function(id) {
        const user = firebase.auth().currentUser;
        if (!user) {
            alert("You must be logged in to confirm delivery.");
            return;
        }

        if (!confirm("Confirm you have received this order?")) return;

        // Disable button to prevent double-clicks
        const btn = document.getElementById('confirmBtn');
        if (btn) {
            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin mr-2"></i> Updating...';
        }

        try {
            const token = await user.getIdToken(true);
            const res = await fetch(`${API_URL}/${id}/status`, {
                method: 'PATCH',
                headers: { 
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify({ status: 'Received' })
            });

            if (res.ok) {
                fetchOrderStatus(); // Refresh UI
            } else {
                const errorData = await res.json();
                alert("Update failed: " + (errorData.message || "Unknown error"));
                if (btn) {
                    btn.disabled = false;
                    btn.innerText = 'Confirm Delivery';
                }
            }
        } catch (err) { 
            console.error(err);
            alert("Network error. Please check your connection."); 
            if (btn) {
                btn.disabled = false;
                btn.innerText = 'Confirm Delivery';
            }
        }
    };

    function getStatusMessage(s) {
        const m = {
            'Pending': 'Verifying order details...',
            'Approved': 'Order confirmed. Moving to production.',
            'Direct Contact': 'Customer support will contact you.',
            'Order Made': 'Items produced and ready for shipping.',
            'Transporting': 'Order is currently being delivered!',
            'Received': 'Delivered successfully. Thank you!',
            'Cancelled': 'This order was cancelled.'
        };
        return m[s] || 'Processing...';
    }

    function renderNoOrderFound() {
        const container = document.getElementById('statusContent');
        if (container) {
            container.innerHTML = `
                <div class="p-20 text-center bg-white rounded-3xl border border-dashed border-gray-200">
                    <h2 class="font-black uppercase italic text-gray-400">No Active Order Found</h2>
                    <p class="text-gray-400 text-[10px] mt-2 uppercase tracking-widest">Start a new order in your cart to see live status.</p>
                </div>`;
        }
    }

    function renderError(msg) {
        const container = document.getElementById('statusContent');
        if (container) {
            container.innerHTML = `<div class="p-10 text-center text-red-500 font-bold uppercase text-[10px]">Sync Error: ${msg}</div>`;
        }
    }
</script>
